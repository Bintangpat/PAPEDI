services:
  postgres:
    image: postgres:16-alpine
    container_name: bootcampsewu-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bootcamp
      POSTGRES_PASSWORD: bootcamp123
      POSTGRES_DB: bootcampsewu
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
